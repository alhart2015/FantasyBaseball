# sgp_denominators -- league-specific SGP denominator overrides (OPTIONAL).
#
# Each value is ABSOLUTE stat-per-standings-place: how much of that category
# it takes, on average, to move one place in this league's standings (e.g.
# "R: 21" means ~21 runs per standings place). Keys must be exact category
# codes; the loader validates them and rejects typos and non-positive values.
#
# Anything omitted keeps its code default (DEFAULT_SGP_DENOMINATORS in
# utils/constants.py). Consumers: the draft board + recommender, in-season
# leverage / roster audit / IL-return planner, the refresh pipeline, scripts.
#
# Adopted 2026-07-05 from a robust trimmed-adjacent-gap calibration over
# 2023-2025 finals + 2026 extrapolated (data/historical_standings.json +
# live standings; drop the largest and smallest of the 9 adjacent-team
# gaps, mean the rest -- the naive mean gap is (max-min)/9, a range
# estimator hostage to punt teams):
#   AVG 0.0025 -- the one slam dunk: 6.4 SD below the generic 0.005 default,
#     tightest CV of all ten categories, below default in 4/4 seasons. One
#     standings place costs ~2.5 AVG points here, not 5.
#   ERA 0.12  -- deliberate HALF-step (point estimate 0.106, only 1.6 SD):
#     below default 4/4 seasons but n=4 is thin. NOTE: combined with the
#     team-IP recalibration (1450->1300), ERA SGP rises ~1.39x total.
# Everything else keeps defaults: R/RBI validated dead-on; SB's wide gaps
# are punt-driven (2025, no punt: gap == default); W is the noisiest
# category (CV 0.61); K/HR/WHIP/SV fail the signal-vs-noise bar.
sgp_denominators:
  AVG: 0.0025
  ERA: 0.12

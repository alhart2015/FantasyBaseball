{% extends "season/base.html" %}
{% block title %}Players — Season Dashboard{% endblock %}
{% block content %}

<style>
.filter-bar {
    display: flex;
    align-items: center;
    gap: 16px;
    margin: 20px 0 12px;
    flex-wrap: wrap;
}
.filter-bar select,
.filter-bar input[type="text"] {
    padding: 8px 12px;
    font-size: 13px;
    background: var(--panel-bg);
    border: 1px solid var(--panel-border);
    border-radius: 6px;
    color: var(--text);
    outline: none;
}
.filter-bar select:focus,
.filter-bar input[type="text"]:focus {
    border-color: var(--accent);
}
.filter-bar label {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: var(--text-secondary);
    cursor: pointer;
}
.filter-bar input[type="checkbox"] { accent-color: var(--accent); }
.filter-bar input[type="text"]::placeholder { color: var(--text-secondary); }
#player-count {
    color: var(--text-secondary);
    font-size: 12px;
    margin-bottom: 8px;
}
#browse-table th {
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
}
#browse-table th:hover { color: var(--text); }
.sort-arrow { font-size: 10px; margin-left: 2px; }
.owner-fa { color: #2196f3; }
.owner-roster { color: var(--success); font-weight: 600; }
.owner-opp { color: var(--text-secondary); }
#empty-msg {
    color: var(--text-secondary);
    font-size: 13px;
    margin-top: 20px;
}
</style>

<div class="page-header">
    <h2>Players</h2>
    {% if meta and meta.get('week') %}
    <div class="week-label">Week {{ meta['week'] }}</div>
    {% endif %}
</div>

<div class="filter-bar">
    <select id="pos-filter">
        <option value="">-- Position --</option>
        <option value="ALL">All Players</option>
        <optgroup label="Hitters">
            <option value="ALL_HIT">All Hitters</option>
            <option value="C">C</option>
            <option value="1B">1B</option>
            <option value="2B">2B</option>
            <option value="3B">3B</option>
            <option value="SS">SS</option>
            <option value="OF">OF</option>
        </optgroup>
        <optgroup label="Pitchers">
            <option value="ALL_PIT">All Pitchers</option>
            <option value="SP">SP</option>
            <option value="RP">RP</option>
        </optgroup>
    </select>
    <label><input type="checkbox" id="fa-only"> FA Only</label>
    <input type="text" id="name-filter" placeholder="Filter by name...">
</div>
<div id="player-count"></div>

<table class="data-table" id="browse-table" style="display:none">
    <thead><tr id="table-head"></tr></thead>
    <tbody id="table-body"></tbody>
</table>

<div id="empty-msg">Select a position or search by name.</div>

<script>
const HITTING_CATS = ['R', 'HR', 'RBI', 'SB', 'AVG'];
const PITCHING_CATS = ['W', 'K', 'SV', 'ERA', 'WHIP'];
const RATE_CATS = new Set(['AVG', 'ERA', 'WHIP']);
const ASC_DEFAULT = new Set(['rank', 'name', 'positions', 'team', 'owner', 'ERA', 'WHIP']);

let allPlayers = null;
let sortCol = 'rank';
let sortAsc = true;

const posFilter = document.getElementById('pos-filter');
const faOnly = document.getElementById('fa-only');
const nameFilter = document.getElementById('name-filter');
const tableEl = document.getElementById('browse-table');
const headEl = document.getElementById('table-head');
const bodyEl = document.getElementById('table-body');
const countEl = document.getElementById('player-count');
const emptyEl = document.getElementById('empty-msg');

emptyEl.textContent = 'Loading player data...';
fetch('/api/players/browse')
    .then(r => r.json())
    .then(data => {
        allPlayers = data;
        emptyEl.textContent = 'Select a position or search by name.';
        render();
    })
    .catch(() => {
        emptyEl.textContent = 'Failed to load player data.';
    });

posFilter.addEventListener('change', render);
faOnly.addEventListener('change', render);
nameFilter.addEventListener('input', render);

function isMixedFilter(pos) {
    return pos === 'ALL' || pos === '';
}

function isHitterFilter(pos) {
    return pos === 'ALL_HIT' || ['C','1B','2B','3B','SS','OF'].includes(pos);
}

function matchesPosition(player, pos) {
    if (pos === 'ALL') return true;
    if (pos === 'ALL_HIT') return player.player_type === 'hitter';
    if (pos === 'ALL_PIT') return player.player_type === 'pitcher';
    if (player.positions && player.positions.includes(pos)) return true;
    // Yahoo only returns "P" for pitchers — infer SP/RP from saves
    if (player.player_type === 'pitcher' && player.positions && player.positions.includes('P')) {
        if (pos === 'SP') return (player.SV || 0) < 5;
        if (pos === 'RP') return (player.SV || 0) >= 5;
    }
    return false;
}

function fmt(val, cat) {
    if (val === null || val === undefined) return '\u2014';
    if (cat === 'AVG') return val.toFixed(3);
    if (RATE_CATS.has(cat)) return val.toFixed(2);
    return Math.round(val);
}

function render() {
    if (!allPlayers) return;
    const pos = posFilter.value;
    const nameQ = nameFilter.value.trim().toLowerCase();

    // Require either a position or a name query
    if (!pos && !nameQ) {
        tableEl.style.display = 'none';
        emptyEl.style.display = '';
        emptyEl.textContent = 'Select a position or search by name.';
        countEl.textContent = '';
        return;
    }

    const mixed = isMixedFilter(pos) || (!pos && nameQ);
    const effectivePos = pos || 'ALL';
    const isHitter = !mixed && isHitterFilter(pos);
    const cats = mixed ? [] : (isHitter ? HITTING_CATS : PITCHING_CATS);
    const validCols = new Set(['rank', 'name', 'positions', 'team', 'owner', 'sgp', 'wsgp', ...cats]);
    if (!validCols.has(sortCol)) {
        sortCol = 'rank';
        sortAsc = true;
    }

    // Filter
    let filtered = allPlayers.filter(p => {
        if (!matchesPosition(p, effectivePos)) return false;
        if (faOnly.checked && p.owner) return false;
        if (nameQ && !p.name.toLowerCase().includes(nameQ)) return false;
        return true;
    });

    // Sort
    filtered.sort((a, b) => {
        let va = sortCol === 'positions' ? (a.positions || []).join(',') : a[sortCol];
        let vb = sortCol === 'positions' ? (b.positions || []).join(',') : b[sortCol];
        if (va == null && vb == null) return 0;
        if (va == null) return 1;
        if (vb == null) return -1;
        if (typeof va === 'string') return sortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
        return sortAsc ? va - vb : vb - va;
    });

    // Columns
    const cols = [
        {key: 'rank', label: 'Rank'},
        {key: 'name', label: 'Name'},
        {key: 'positions', label: 'Pos'},
        {key: 'team', label: 'Team'},
        {key: 'owner', label: 'Owner'},
        ...cats.map(c => ({key: c, label: c})),
        {key: 'sgp', label: 'SGP'},
        {key: 'wsgp', label: 'wSGP'},
    ];

    headEl.innerHTML = cols.map(c => {
        const arrow = sortCol === c.key ? (sortAsc ? ' \u25B2' : ' \u25BC') : '';
        return '<th data-col="' + c.key + '">' + c.label +
               '<span class="sort-arrow">' + arrow + '</span></th>';
    }).join('');

    headEl.querySelectorAll('th').forEach(th => {
        th.onclick = () => {
            const col = th.dataset.col;
            if (sortCol === col) {
                sortAsc = !sortAsc;
            } else {
                sortCol = col;
                sortAsc = ASC_DEFAULT.has(col);
            }
            render();
        };
    });

    // Rows
    bodyEl.innerHTML = filtered.map(p => {
        const ownerText = p.owner == null ? 'FA'
            : p.owner === 'roster' ? 'Yours' : p.owner;
        const ownerClass = p.owner == null ? 'owner-fa'
            : p.owner === 'roster' ? 'owner-roster' : 'owner-opp';
        const rankText = p.rank != null ? p.rank : '\u2014';
        const posText = p.positions && p.positions.length ? p.positions.join(', ') : '\u2014';

        let cells = '<td>' + rankText + '</td>' +
            '<td style="text-align:left;font-weight:500">' + p.name + '</td>' +
            '<td>' + posText + '</td>' +
            '<td>' + (p.team || '') + '</td>' +
            '<td class="' + ownerClass + '">' + ownerText + '</td>';

        cats.forEach(c => {
            const sig = p.significant && p.significant[c] ? ' stat-significant' : '';
            cells += '<td class="' + sig.trim() + '">' + fmt(p[c], c) + '</td>';
        });
        cells += '<td>' + (p.sgp != null ? p.sgp.toFixed(1) : '\u2014') + '</td>';
        cells += '<td>' + (p.wsgp != null ? p.wsgp.toFixed(1) : '\u2014') + '</td>';

        return '<tr>' + cells + '</tr>';
    }).join('');

    tableEl.style.display = '';
    emptyEl.style.display = 'none';
    countEl.textContent = filtered.length + ' player' + (filtered.length !== 1 ? 's' : '');
}
</script>

{% endblock %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Season Dashboard{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='season.css') }}">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
</head>
<body>
    <div class="layout">
        <nav class="sidebar">
            <div class="sidebar-header">Hart of the Order</div>
            <a href="{{ url_for('standings') }}"
               class="nav-link {% if active_page == 'standings' %}active{% endif %}">
                Standings
            </a>
            <a href="{{ url_for('lineup') }}"
               class="nav-link {% if active_page == 'lineup' %}active{% endif %}">
                Lineup
            </a>
            <a href="{{ url_for('waivers_trades') }}"
               class="nav-link {% if active_page == 'waivers_trades' %}active{% endif %}">
                Waivers &amp; Trades
            </a>
            <a href="{{ url_for('sql_runner') }}"
               class="nav-link {% if active_page == 'sql' %}active{% endif %}">
                SQL
            </a>
            <div class="sidebar-footer">
                <div class="refresh-info">
                    {% if meta and meta.get('last_refresh') %}
                        Last refresh: {{ meta['last_refresh'] }}
                    {% else %}
                        No data yet
                    {% endif %}
                </div>
                <button class="btn-refresh" id="refresh-btn" onclick="startRefresh()">Refresh Data</button>
                <button class="btn-refresh" id="mlb-btn" onclick="startMlbFetch()" style="margin-top: 6px; background: var(--panel-border); color: var(--text);">Fetch MLB Data</button>
                <div id="refresh-progress" style="display: none; font-size: 11px; color: var(--accent); margin-top: 6px;"></div>
            </div>
        </nav>
        <main class="content">
            {% block content %}{% endblock %}
        </main>
    </div>
<script>
function startBackgroundTask(apiUrl, btnId, busyText, doneAction) {
    const btn = document.getElementById(btnId);
    const otherBtn = document.getElementById(btnId === 'refresh-btn' ? 'mlb-btn' : 'refresh-btn');
    const progress = document.getElementById('refresh-progress');
    const originalText = btn.textContent;

    btn.disabled = true;
    otherBtn.disabled = true;
    btn.textContent = busyText;
    progress.style.display = 'block';
    progress.style.color = 'var(--accent)';

    fetch(apiUrl, {method: 'POST'})
        .then(r => r.json())
        .then(() => pollStatus(btn, otherBtn, originalText, doneAction));
}

function pollStatus(btn, otherBtn, originalText, doneAction) {
    const progress = document.getElementById('refresh-progress');

    fetch('/api/refresh-status')
        .then(r => r.json())
        .then(data => {
            progress.textContent = data.progress || 'Working...';
            if (data.running) {
                setTimeout(() => pollStatus(btn, otherBtn, originalText, doneAction), 1000);
            } else if (data.error) {
                progress.textContent = 'Error: ' + data.error;
                progress.style.color = 'var(--danger)';
                btn.disabled = false;
                otherBtn.disabled = false;
                btn.textContent = originalText;
            } else {
                btn.disabled = false;
                otherBtn.disabled = false;
                btn.textContent = originalText;
                if (doneAction === 'reload') {
                    window.location.reload();
                } else {
                    progress.textContent = data.progress || 'Done!';
                    setTimeout(() => { progress.style.display = 'none'; }, 5000);
                }
            }
        })
        .catch(() => setTimeout(() => pollStatus(btn, otherBtn, originalText, doneAction), 2000));
}

function startRefresh() {
    startBackgroundTask('/api/refresh', 'refresh-btn', 'Refreshing...', 'reload');
}

function startMlbFetch() {
    startBackgroundTask('/api/fetch-mlb', 'mlb-btn', 'Fetching...', 'show');
}
</script>
</body>
</html>

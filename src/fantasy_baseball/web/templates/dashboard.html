<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Draft Room</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#9918;</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@600;700;800;900&family=Newsreader:ital,opsz,wght@0,6..72,400..700;1,6..72,400..700&family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" />
  <link rel="stylesheet" href="/static/style.css" />
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="brand-mark">Hart of <em>the</em> Order</span>
      <span class="brand-sub">Draft Room</span>
    </div>
    <div class="scoreboard">
      <div class="score-cell">
        <span class="score-label">Round</span>
        <span class="score-num" id="round">--</span>
      </div>
      <div class="score-cell">
        <span class="score-label">Pick</span>
        <span class="score-num" id="pick">--</span>
      </div>
      <div class="score-cell otc">
        <span class="score-label">On the clock</span>
        <button id="otc-btn" class="team-override">--</button>
      </div>
      <div class="score-cell">
        <span class="score-label">Your next</span>
        <span class="score-num small" id="picks-to-next">--</span>
      </div>
    </div>
    <div class="lifecycle-buttons">
      <button id="new-draft-btn">New Draft</button>
    </div>
  </header>

  <main class="dashboard-grid">
    <section class="available-players">
      <header>
        <input type="search" id="player-filter" placeholder="Filter players…" />
        <select id="position-filter" aria-label="Filter by position">
          <option value="">All positions</option>
          <option value="C">C</option>
          <option value="1B">1B</option>
          <option value="2B">2B</option>
          <option value="3B">3B</option>
          <option value="SS">SS</option>
          <option value="IF">IF</option>
          <option value="OF">OF</option>
          <option value="UTIL">UTIL</option>
          <option value="SP">SP</option>
          <option value="RP">RP</option>
          <option value="P">P (any pitcher)</option>
        </select>
      </header>
      <div class="player-list-header">
        <button class="name" data-sort="name">Name</button>
        <span class="pos">Pos</span>
        <button class="adp" data-sort="adp">ADP</button>
        <button class="sgp" data-sort="sgp">SGP</button>
      </div>
      <ul id="player-list"></ul>
    </section>

    <section class="recommendations">
      <header>
        <h2>Recommendations <span id="recs-status" class="recs-status"></span></h2>
        <div class="sort-toggle">
          <button data-sort="immediate" class="active">Immediate Δ</button>
          <button data-sort="vopn">Value of picking now</button>
        </div>
      </header>
      <ol id="rec-list"></ol>

      <section class="roto-grid-panel">
        <header>
          <h3>Projected category points <span id="roto-grid-team" class="grid-team"></span></h3>
        </header>
        <div id="roto-grid" class="roto-grid"></div>
      </section>
    </section>

    <section class="team-inspector">
      <header>
        <div class="tabs">
          <button data-tab="roster" class="active">Roster</button>
          <button data-tab="standings">Standings</button>
        </div>
        <select id="team-picker"></select>
      </header>
      <div id="roster-panel" class="panel"></div>
      <div id="standings-panel" class="panel hidden"></div>
    </section>
  </main>

  <footer class="recent-picks">
    <ol id="recent-picks"></ol>
    <button id="undo-btn">Undo</button>
  </footer>

  <script src="/static/draft.js"></script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Draft Dashboard</title>
  <link rel="stylesheet" href="/static/style.css" />
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
</head>
<body>
  <header class="topbar">
    <div class="round-pick">
      R<span id="round">–</span> P<span id="pick">–</span>
    </div>
    <div class="on-the-clock">
      On the clock:
      <button id="otc-btn" class="team-override">—</button>
    </div>
    <div class="next-pick">Your next: <span id="picks-to-next">—</span></div>
    <div class="lifecycle-buttons">
      <button id="new-draft-btn">New Draft</button>
    </div>
  </header>

  <main class="dashboard-grid">
    <section class="available-players">
      <header>
        <input type="search" id="player-filter" placeholder="Filter players…" />
        <select id="position-filter" aria-label="Filter by position">
          <option value="">All positions</option>
          <option value="C">C</option>
          <option value="1B">1B</option>
          <option value="2B">2B</option>
          <option value="3B">3B</option>
          <option value="SS">SS</option>
          <option value="IF">IF</option>
          <option value="OF">OF</option>
          <option value="UTIL">UTIL</option>
          <option value="SP">SP</option>
          <option value="RP">RP</option>
          <option value="P">P (any pitcher)</option>
        </select>
      </header>
      <div class="player-list-header">
        <button class="name" data-sort="name">Name</button>
        <span class="pos">Pos</span>
        <button class="adp" data-sort="adp">ADP</button>
        <button class="sgp" data-sort="sgp">SGP</button>
      </div>
      <ul id="player-list"></ul>
    </section>

    <section class="recommendations">
      <header>
        <h2>Recommendations <span id="recs-status" class="recs-status"></span></h2>
        <div class="sort-toggle">
          <button data-sort="immediate" class="active">Immediate Δ</button>
          <button data-sort="vopn">Value of picking now</button>
        </div>
      </header>
      <ol id="rec-list"></ol>
    </section>

    <section class="team-inspector">
      <header>
        <div class="tabs">
          <button data-tab="roster" class="active">Roster</button>
          <button data-tab="standings">Standings</button>
        </div>
        <select id="team-picker"></select>
      </header>
      <div id="roster-panel" class="panel"></div>
      <div id="standings-panel" class="panel hidden"></div>
    </section>
  </main>

  <footer class="recent-picks">
    <ol id="recent-picks"></ol>
    <button id="undo-btn">Undo</button>
  </footer>

  <script src="/static/draft.js"></script>
</body>
</html>
